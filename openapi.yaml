openapi: 3.1.0
info:
  title: Bread Route Manager API
  version: 1.0.0
  description: Warehouse packing, picking, delivery, reporting and Rockland ticket import API.
servers:
  - url: /api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /health:
    get:
      security: []
      responses:
        '200': { description: Service health }
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: JWT and user profile }
  /routes:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Routes visible to authenticated user }
    post:
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Route created }
  /documents/upload:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document: { type: string, format: binary }
      responses:
        '201': { description: Parsed document preview }
  /documents/{id}/approve:
    post:
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Tickets imported into routes }
  /reports/dashboard:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Operational KPIs }
  /reports/export.csv:
    get:
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: CSV operational export
          content:
            text/csv: {}
security:
  - bearerAuth: []
